apiVersion: v1
kind: Service
metadata:
  name: thanos-storegateway
  namespace: opentelemetry
  labels: { app: thanos-storegateway }
spec:
  selector: { app: thanos-storegateway }
  ports:
    - { name: grpc, port: 10901, targetPort: 10901 }
    - { name: http, port: 10902, targetPort: 10902 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-storegateway
  namespace: opentelemetry
spec:
  replicas: 1
  selector:
    matchLabels: { app: thanos-storegateway }
  template:
    metadata:
      labels: { app: thanos-storegateway }
    spec:
      containers:
        - name: storegateway
          image: quay.io/thanos/thanos:v0.41.0
          args:
            - store
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
            - --data-dir=/var/thanos/store
            - --objstore.config-file=/etc/thanos/objstore/thanos.yaml
          ports:
            - { name: grpc, containerPort: 10901 }
            - { name: http, containerPort: 10902 }
          volumeMounts:
            - { name: data, mountPath: /var/thanos/store }
            - { name: objstore, mountPath: /etc/thanos/objstore, readOnly: true }
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "2",  memory: 2Gi }
      volumes:
        - name: objstore
          secret:
            secretName: thanos-objstore
        - name: data
          emptyDir: {}