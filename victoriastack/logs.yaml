---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victorialogs-data
  namespace: opentelemetry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: do-block-storage

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victorialogs
  namespace: opentelemetry
  labels:
    app: victorialogs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victorialogs
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: victorialogs
    spec:
      containers:
        - name: victorialogs
          image: victoriametrics/victoria-logs:v1.21.0-victorialogs
          args:
            - -storageDataPath=/storage
            - -retentionPeriod=30d
            - -httpListenAddr=:9428
            - -syslog.listenAddr.tcp=
            - -syslog.listenAddr.udp=
          ports:
            - name: http
              containerPort: 9428
          volumeMounts:
            - name: storage
              mountPath: /storage
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9428
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9428
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victorialogs-data

---
apiVersion: v1
kind: Service
metadata:
  name: victorialogs
  namespace: opentelemetry
  labels:
    app: victorialogs
spec:
  selector:
    app: victorialogs
  ports:
    - name: http
      port: 9428
      targetPort: 9428
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: opentelemetry
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://victorialogs.opentelemetry.svc.cluster.local:9428/insert/loki/api/v1/push
        tenant_id: default

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Parse JSON logs if the app emits them
          - json:
              expressions:
                level: level
                msg: msg
          # If not JSON, treat the whole line as the message
          - labels:
              level:
        relabel_configs:
          # Keep only pods with running containers
          - source_labels: [__meta_kubernetes_pod_phase]
            regex: Pending|Running|Succeeded|Failed
            action: keep
          # Add namespace label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Add pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Add container name label
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Add node name label
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # Add app label if present
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          # Set the log path to read from
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            replacement: /var/log/pods/*$1*/*$2*/*.log
          # Fallback path format
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            regex: (.+);(.+)
            target_label: __path__
            replacement: /var/log/pods/*$1*/$2/*.log

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: opentelemetry

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: opentelemetry

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: opentelemetry
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail
          image: grafana/promtail:3.4.1
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - name: http
              containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}