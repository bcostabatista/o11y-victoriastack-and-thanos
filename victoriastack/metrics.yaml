---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoriametrics-data
  namespace: opentelemetry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: do-block-storage

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: opentelemetry
  labels:
    app: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  strategy:
    type: Recreate 
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.112.0
          args:
            - -storageDataPath=/storage
            - -retentionPeriod=90d
            - -httpListenAddr=:8428
            - -selfScrapeInterval=10s
            - -promscrape.suppressDuplicateScrapeTargetErrors=true
          ports:
            - name: http
              containerPort: 8428
          volumeMounts:
            - name: storage
              mountPath: /storage
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victoriametrics-data

---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: opentelemetry
  labels:
    app: victoriametrics
spec:
  selector:
    app: victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
  type: ClusterIP